server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.php index.html index.htm;

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;

    client_max_body_size 1024M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Caché de assets estáticos (1 mes)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Raíz: dashboard visual de proyectos (reemplaza autoindex)
    location = / {
        rewrite ^ /dashboard.php last;
    }

    # Archivos estáticos y directorios — sirve directo si existe
    location / {
        try_files $uri $uri/ @project_fallback;
    }

    # Fallback: redirige al index.php del proyecto (primer segmento de la URL)
    # Ej: /miproyecto/controlador/metodo → /miproyecto/index.php?$args
    location @project_fallback {
        rewrite ^(/[^/?]+) $1/index.php?$args last;
    }

    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Fastcgi optimización
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 900;
        fastcgi_send_timeout 900;
    }

    # Denegar acceso a archivos ocultos (.ht, .env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Denegar acceso a archivos sensibles
    location ~* /(composer\.(json|lock|phar)|package\.json|\.git|\.env) {
        deny all;
        return 404;
    }
}
