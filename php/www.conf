; ============================================================
; PHP-FPM Pool Configuration — Optimizado para concurrencia
; ============================================================
; Este archivo reemplaza el pool www por defecto con configuración
; optimizada para manejar múltiples requests simultáneos

[www]
user = appuser
group = appuser

; Puerto/socket donde escucha PHP-FPM
listen = 9000
listen.owner = appuser
listen.group = appuser
listen.mode = 0660

; ============================================================
; Process Manager — Dynamic (recomendado para producción)
; ============================================================
; Tipos disponibles:
; - static: procesos fijos (usa más memoria, predecible)
; - dynamic: crea/destruye procesos según demanda (recomendado)
; - ondemand: crea procesos solo cuando hay requests (muy bajo overhead)

pm = dynamic

; Número mínimo de procesos PHP-FPM en reposo
; AUMENTADO: de 5 (default) a 10 para tener más workers disponibles
pm.min_spare_servers = 10

; Número máximo de procesos PHP-FPM en reposo
; AUMENTADO: de 5 (default) a 20 para buffer ante picos
pm.max_spare_servers = 20

; Número máximo total de procesos PHP-FPM
; AUMENTADO: de 5 (default) a 100 para soportar 100+ requests concurrentes
pm.max_children = 100

; Número de requests antes de reciclar un worker
; Previene memory leaks — recicla worker cada 1000 requests
pm.max_requests = 1000

; Time to wait before killing a busy worker (segundos)
pm.process_idle_timeout = 10s

; ============================================================
; Comunicación y buffers
; ============================================================

; Request terminate timeout (máximo tiempo de ejecución)
request_terminate_timeout = 900s

; Request slowlog (requests que toman más de N segundos)
slowlog = /var/log/php-fpm.log.slow
request_slowlog_timeout = 10s

; Status page (para monitoreo)
pm.status_path = /status
ping.path = /ping
ping.response = pong

; ============================================================
; Environment variables — accesibles en $_SERVER
; ============================================================

catch_workers_output = yes
clear_env = no

; Variables PHP importantes
env[SCRIPT_FILENAME] = $document_root$fastcgi_script_name
env[REQUEST_METHOD] = $request_method
env[QUERY_STRING] = $query_string
env[CONTENT_TYPE] = $content_type
env[CONTENT_LENGTH] = $content_length

; ============================================================
; Logging
; ============================================================

decorate_workers_output = no
