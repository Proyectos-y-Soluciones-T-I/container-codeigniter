; ============================================================
; PHP Custom Configuration — docker-ci-container
; ============================================================
; Montado como volumen en /usr/local/etc/php/conf.d/custom.ini
; Cambios toman efecto al reiniciar el contenedor (sin rebuild)

[PHP]
; --- Zona horaria (Colombia) ---
date.timezone = America/Bogota

; --- Límites de subida (1 GB) ---
post_max_size = 1024M
upload_max_filesize = 1024M
memory_limit = 1024M
max_input_time = 900
max_execution_time = 900

; --- Sesiones ---
session.save_handler = files
session.save_path = /tmp
session.cookie_httponly = 1
session.cookie_secure = 0
session.use_strict_mode = 1
session.sid_length = 48

; --- Buffering ---
output_buffering = On

; --- Errores ---
; Desarrollo: cambiar a On para ver errores en pantalla
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE
error_log = /dev/stderr

; --- Seguridad ---
expose_php = Off

; ============================================================
; Opcache — aceleración de PHP en desarrollo
; ============================================================
; validate_timestamps=1 detecta cambios sin reiniciar (ideal para dev)
; Si querés simular producción, ponelo en 0 y recordá reiniciar tras cambios

[opcache]
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1
opcache.enable_cli = 0
