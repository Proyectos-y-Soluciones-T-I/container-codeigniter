; ============================================================
; PHP Custom Configuration — docker-ci-container
; ============================================================
; Montado como volumen en /usr/local/etc/php/conf.d/custom.ini
; Cambios toman efecto al reiniciar el contenedor (sin rebuild)

[PHP]
; --- Zona horaria (Colombia) ---
date.timezone = America/Bogota

; --- Límites de subida (1 GB) ---
post_max_size = 1024M
upload_max_filesize = 1024M
memory_limit = 1024M
max_input_time = 900
max_execution_time = 900

; --- Sesiones ---
session.save_handler = files
session.save_path = /tmp
session.cookie_httponly = 1
session.cookie_secure = 0
session.use_strict_mode = 1
session.sid_length = 48

; --- Buffering ---
output_buffering = 4096

; --- Errores ---
; Desarrollo: cambiar a On para ver errores en pantalla
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE
error_log = /dev/stderr

; --- Seguridad ---
expose_php = Off

; ============================================================
; Opcache — aceleración de PHP (DESARROLLO LOCAL)
; ============================================================
; validate_timestamps=1 detecta cambios en archivos automáticamente
; Para producción: cambiar a 0 + revalidate_freq=0 (máximo rendimiento)

[opcache]
opcache.enable = 1
opcache.enable_cli = 0

; Memoria: AUMENTADA de 128MB a 256MB para cachear más código
opcache.memory_consumption = 256

; Strings internos: AUMENTADO de 16MB a 32MB
opcache.interned_strings_buffer = 32

; Máximo archivos a cachear: AUMENTADO de 10000 a 20000
opcache.max_accelerated_files = 20000

; Validación de timestamps: 1 en desarrollo (revisa cambios cada N segundos)
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; Optimizaciones avanzadas
opcache.fast_shutdown = 1
opcache.file_update_protection = 2
opcache.huge_code_pages = 1
opcache.optimization_level = 0x7FFEBFFF
