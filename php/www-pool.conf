; ============================================================
; PHP-FPM Pool Configuration — Optimizado para concurrencia
; ============================================================
; Nombre: zzz-www-pool.conf (loaded AFTER www.conf default)
; Sobrescribe valores del pool www por defecto

[www]
; Process Manager — Dynamic (recomendado para producción)
pm = dynamic

; Número mínimo de procesos PHP-FPM en reposo
; AUMENTADO: de 5 a 10 para más workers disponibles
pm.min_spare_servers = 10

; Número máximo de procesos PHP-FPM en reposo
; AUMENTADO: de 5 a 20 para buffer ante picos
pm.max_spare_servers = 20

; Número inicial de procesos — DEBE estar entre min y max
pm.start_servers = 15

; Número máximo total de procesos PHP-FPM
; AUMENTADO: de 5 a 100 para soportar 100+ requests concurrentes
pm.max_children = 100

; Número de requests antes de reciclar un worker
; Previene memory leaks
pm.max_requests = 1000

; Time to wait before killing a busy worker (segundos)
pm.process_idle_timeout = 10s

; Request terminate timeout (máximo tiempo de ejecución)
request_terminate_timeout = 900s

; Request slowlog (requests lentos)
slowlog = /dev/null
request_slowlog_timeout = 10s

; Status page para monitoreo
pm.status_path = /status

; Output de workers
catch_workers_output = yes
clear_env = no

; Logging
decorate_workers_output = no
